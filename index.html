<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日運勢占卜</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #0a0a0a; color: #d4af37; 
            font-family: 'Noto Serif TC', serif; 
            margin: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .main-card {
            width: 90%; max-width: 450px;
            padding: 40px;
            border: 2px solid #d4af37;
            border-radius: 20px;
            text-align: center;
            background: linear-gradient(180deg, rgba(20, 20, 20, 0.9) 0%, rgba(0, 0, 0, 1) 100%);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            animation: fadeIn 1.2s ease-out forwards;
        }
        h1 { font-size: 2rem; color: #fff; letter-spacing: 0.2rem; margin-bottom: 5px; }
        .instruction { color: #aaa; font-size: 0.9rem; margin-bottom: 25px; }
        .label { font-size: 0.8rem; color: #888; margin-top: 15px; display: block; text-align: left; }
        
        .input-group { display: flex; gap: 10px; margin-top: 5px; }
        input { 
            background: transparent; border: 1px solid #444; color: #fff;
            padding: 10px; width: 33%; text-align: center; border-radius: 5px; font-family: 'Noto Serif TC', serif;
        }

        .gender-group { display: flex; gap: 10px; margin: 20px 0; }
        .gender-btn { 
            flex: 1; padding: 10px; background: transparent; border: 1px solid #444;
            color: #888; cursor: pointer; border-radius: 5px; transition: 0.3s;
        }
        .gender-btn.active { border-color: #d4af37; color: #d4af37; }

        /* 純 CSS 繪製的水晶球 */
        .crystal-ball { 
            width: 150px; height: 150px;
            margin: 30px auto;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff8dc, #d4af37, #5c4033);
            cursor: pointer;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.5), 0 0 20px rgba(212,175,55,0.6);
            animation: breathing 4s ease-in-out infinite;
            transition: transform 0.3s;
        }
        .crystal-ball:active { transform: scale(0.95); }
        
        #result { border: 1px solid #d4af37; padding: 20px; display: none; margin-top: 20px; }
        .result-name { font-size: 2.5rem; color: #d4af37; margin: 0; }
        .result-desc { color: #fff; margin-top: 10px; font-size: 1.1rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes breathing { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body>

<div class="main-card">
    <h1>今日運勢抽籤</h1>
    <p class="instruction">開始前 請先感謝自己的存在</p>
    
    <span class="label">出生年月日</span>
    <div class="input-group">
        <input type="number" id="year" placeholder="YYYY" onfocus="resetView()">
        <input type="number" id="month" placeholder="MM" onfocus="resetView()">
        <input type="number" id="day" placeholder="DD" onfocus="resetView()">
    </div>

    <div class="gender-group">
        <button class="gender-btn" onclick="setGender('男', this)">男</button>
        <button class="gender-btn" onclick="setGender('女', this)">女</button>
    </div>

    <div class="crystal-ball" onclick="checkFortune()"></div>

    <div id="result"></div>
</div>

<script>
    let selectedGender = '';
    function setGender(g, btn) {
        selectedGender = g;
        document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        resetView();
    }

    function resetView() {
        document.getElementById('result').style.display = 'none';
    }

        { name: "奈米吉", desc: "微小的好運 今天每說一次謝謝 好運加1%" },
        { name: "小吉", desc: "小確幸等著你 留意身邊的小
