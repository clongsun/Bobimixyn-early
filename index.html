<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日運勢抽籤</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at center, #2a2a35 0%, #050505 100%);
            color: #FFF; 
            font-family: 'Noto Serif TC', serif; 
            margin: 0; height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; 
        }
        .container { 
            width: 90%; max-width: 500px; text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: fadeIn 1.2s ease-out forwards;
        }
        h1 { font-size: 2rem; letter-spacing: 0.3rem; margin-bottom: 5px; }
        .instruction { font-size: 0.9rem; color: #DDD; margin-bottom: 20px; }
        
        /* 加入明確的標籤 */
        .label-text { font-size: 0.8rem; color: rgba(255, 255, 255, 0.6); margin-bottom: 5px; display: block; text-align: left; }
        .input-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        input { 
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3);
            color: #FFF; padding: 12px; font-size: 1.2rem; text-align: center; width: 33%;
            border-radius: 10px; font-family: 'Noto Serif TC', serif;
        }
        input::placeholder { color: rgba(255, 255, 255, 0.4); font-size: 0.9rem; }
        
        .gender-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .gender-btn { 
            flex: 1; padding: 12px; font-size: 1.2rem; background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.2); color: #FFF; cursor: pointer;
            border-radius: 10px; transition: 0.3s;
        }
        .gender-btn.active { background: rgba(255, 255, 255, 0.3); }
        
        button { 
            width: 100%; padding: 15px; font-size: 1.5rem; background: rgba(255, 255, 255, 0.15); 
            color: #FFF; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 10px; cursor: pointer;
        }
        
        #result { height: 160px; display: flex; flex-direction: column; justify-content: center; margin-top: 20px; }
        .name { font-size: 3rem; font-weight: bold; margin: 0; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .desc { font-size: 1.2rem; margin-top: 10px; line-height: 1.4; color: #EEE; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes revealResult { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .result-reveal { animation: revealResult 0.8s ease-out forwards; }
    </style>
</head>
<body>

<div class="container">
    <h1>今日運勢抽籤</h1>
    <p class="instruction">開始前，請先感謝自己的存在。</p>
    
    <span class="label-text">出生年月日</span>
    <div class="input-group">
        <input type="number" id="year" placeholder="YYYY" min="1900" max="2026">
        <input type="number" id="month" placeholder="MM" min="1" max="12">
        <input type="number" id="day" placeholder="DD" min="1" max="31">
    </div>

    <div class="gender-group">
        <button class="gender-btn" onclick="setGender('男', this)">男</button>
        <button class="gender-btn" onclick="setGender('女', this)">女</button>
    </div>

    <button onclick="checkFortune()">測 運</button>
    <div id="result"></div>
</div>

<script>
    let selectedGender = '';
    function setGender(g, btn) {
        selectedGender = g;
        document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // 將所有權重設為 1，達到機率完全均等
    const fortunes = [
        { name: "奈米吉", weight: 1, desc: "微小的好運。今天每說一次謝謝，好運+1%！" },
        { name: "小吉", weight: 1, desc: "小確幸等著你，留意身邊的小美好。" },
        { name: "吉", weight: 1, desc: "今日平安順利，穩穩當當是最好的節奏。" },
        { name: "大吉", weight: 1, desc: "好事連連，準備好接收驚喜吧！" },
        { name: "超級大吉", weight: 1, desc: "運勢爆棚！紅綠燈都為你亮綠燈。" },
        { name: "天降大吉", weight: 1, desc: "主角劇本已就緒，勇敢去發揮吧！" },
        { name: "錦鯉附體吉", weight: 1, desc: "好運如魚得水，轉發給朋友分享喜悅。" },
        { name: "閃亮亮吉", weight: 1, desc: "今天特別亮眼，穿上喜歡的衣服出門。" },
        { name: "連擊吉", weight: 1, desc: "好運連環爆發中，好事一波接一波。" },
        { name: "宇宙級大吉", weight: 1, desc: "連外星人都羨慕你，多拍幾張自拍。" },
        { name: "隱藏版大吉", weight: 1, desc: "恭喜發現終極秘密！從現在起，幸福快樂。" }
    ];

    function checkFortune() {
        const y = document.getElementById('year').value;
        const m = document.getElementById('month').value;
        const d = document.getElementById('day').value;
        
        if (!y || !m || !d || !selectedGender) return alert("請完整輸入日期與性別");
        if (m > 12 || d > 31) return alert("日期格式似乎不太正確喔");

        const today = new Date().toISOString().split('T')[0];
        const key = `fortune_${y}${m}${d}_${selectedGender}`;
        let data = JSON.parse(localStorage.getItem(key));

        if (!data || data.date !== today) {
            // 隨機選取
            const randomIndex = Math.floor(Math.random() * fortunes.length);
            data = { date: today, result: fortunes[randomIndex].name };
            localStorage.setItem(key, JSON.stringify(data));
        }

        const fortune = fortunes.find(f => f.name === data.result);
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `
            <div class="result-reveal">
                <p class="name">${fortune.name}</p>
                <p class="desc">${fortune.desc}</p>
            </div>
        `;
    }
</script>
</body>
</html>
