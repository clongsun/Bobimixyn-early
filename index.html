<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>今日運勢抽籤</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #FFFFFF; 
            color: #111; 
            font-family: 'Noto Serif TC', serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .container { width: 90%; max-width: 600px; }
        h1 { font-size: 2.5rem; letter-spacing: 0.5rem; text-align: center; margin-bottom: 40px; }
        
        /* 移除多餘邊框，讓空間最大化 */
        .main-box { padding: 20px; }
        
        input, select, button { 
            width: 100%; 
            padding: 20px; 
            margin: 15px 0; 
            border: 2px solid #111; 
            background: #FFF; 
            font-size: 1.5rem; 
            font-family: 'Noto Serif TC', serif;
        }
        button { background: #111; color: #FFF; cursor: pointer; font-weight: bold; }
        button:hover { background: #444; }
        
        .result-area { margin-top: 40px; text-align: center; }
        .result-name { font-size: 3.5rem; font-weight: bold; margin: 0; }
        .result-desc { font-size: 2rem; margin-top: 20px; line-height: 1.5; }
        
        .rare-glow { border-bottom: 5px solid #111; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>今日運勢抽籤</h1>
    
    <div class="main-box">
        <p style="font-size: 1.2rem; text-align: center; color: #666;">開始前，請先在心中感謝自己的存在。</p>
        <input type="date" id="birthday">
        <select id="gender">
            <option value="male">男</option>
            <option value="female">女</option>
        </select>
        <button onclick="checkFortune()">開始測運</button>
    </div>

    <div id="result" class="result-area"></div>
</div>

<script>
    const fortunes = [
        { name: "奈米吉", weight: 15, desc: "微小但確實的好運。今天每說一次謝謝，都會為你增加1%的好運唷！" },
        { name: "小吉", weight: 15, desc: "小確幸等著你。記得留意身邊的小美好哦。" },
        { name: "吉", weight: 15, desc: "今日平安順利。穩穩當當就是最好的節奏。" },
        { name: "大吉", weight: 15, desc: "好事連連，準備好接收驚喜吧！" },
        { name: "超級大吉", weight: 12, desc: "運勢爆棚！上廁所都有衛生紙、停車都有位....紅綠燈都為你亮綠燈。" },
        { name: "天降大吉", weight: 10, desc: "天選之人，主角劇本已為你準備就緒。勇敢去做一直想做的事吧！" },
        { name: "錦鯉附體吉", weight: 6, desc: "好運如魚得水。轉發這個結果，好運傳給朋友。" },
        { name: "閃亮亮吉", weight: 5, desc: "今天特別亮眼奪目，記得穿最喜歡的衣服出門！" },
        { name: "連擊吉", weight: 4, desc: "好運連環爆發中！一波未平一波又起的好事。" },
        { name: "宇宙級大吉", weight: 2, desc: "連外星人都羨慕你，建議今天多拍幾張自拍。" },
        { name: "隱藏版大吉", weight: 1, desc: "恭喜發現終極秘密！從此刻開始，只有幸福快樂了！記得保持身心健康。" }
    ];

    function checkFortune() {
        const birthday = document.getElementById('birthday').value;
        const gender = document.getElementById('gender').value;
        if (!birthday) return alert("請選擇生日！");

        const today = new Date().toISOString().split('T')[0];
        const key = `fortune_${birthday}_${gender}`;
        let data = JSON.parse(localStorage.getItem(key));

        if (!data || data.date !== today) {
            let rand = Math.random() * 100;
            let sum = 0;
            let resultName = fortunes[fortunes.length - 1].name;
            for (let f of fortunes) {
                sum += f.weight;
                if (rand < sum) { resultName = f.name; break; }
            }
            data = { date: today, result: resultName };
            localStorage.setItem(key, JSON.stringify(data));
        }

        const fortune = fortunes.find(f => f.name === data.result);
        const isRare = ["錦鯉附體吉", "閃亮亮吉", "連擊吉", "宇宙級大吉", "隱藏版大吉"].includes(fortune.name);
        
        document.getElementById('result').innerHTML = `
            <div class="${isRare ? 'rare-glow' : ''}">
                <p class="result-name">${fortune.name}</p>
                <p class="result-desc">${fortune.desc}</p>
            </div>
        `;
    }
</script>
</body>
</html>
