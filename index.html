<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>今日運勢 - 時尚科技版</title>
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; }
        input, select, button { margin: 10px; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; }
        button { cursor: pointer; transition: 0.3s; border: 1px solid white; }
        button:hover { background: white; color: black; }
        #result { margin-top: 20px; font-size: 1.5rem; color: #38bdf8; }
    </style>
</head>
<body>

<div class="glass-card">
    <h2 id="msg">開始前，希望你能先感謝自己的存在。</h2>
    <input type="date" id="birthday">
    <select id="gender">
        <option value="male">男</option>
        <option value="female">女</option>
    </select>
    <button onclick="checkFortune()">開始測運</button>
    <div id="result"></div>
</div>

<script>
    const fortunes = [
        { name: "奈米吉", weight: 15 }, { name: "小吉", weight: 15 },
        { name: "吉", weight: 15 }, { name: "大吉", weight: 15 },
        { name: "超級大吉", weight: 12 }, { name: "天降大吉", weight: 10 },
        { name: "錦鯉附體吉", weight: 6 }, { name: "閃亮亮吉", weight: 5 },
        { name: "連擊吉", weight: 4 }, { name: "宇宙級大吉", weight: 2 },
        { name: "隱藏版大吉", weight: 1 }
    ];

    function checkFortune() {
        const birthday = document.getElementById('birthday').value;
        const gender = document.getElementById('gender').value;
        if (!birthday) return alert("請選擇生日！");

        const today = new Date().toISOString().split('T')[0];
        const key = `fortune_${birthday}_${gender}`;
        let data = JSON.parse(localStorage.getItem(key));

        if (!data || data.date !== today) {
            let rand = Math.random() * 100;
            let sum = 0;
            let result = fortunes[fortunes.length - 1].name;
            for (let f of fortunes) {
                sum += f.weight;
                if (rand < sum) { result = f.name; break; }
            }
            data = { date: today, result: result };
            localStorage.setItem(key, JSON.stringify(data));
        }
        document.getElementById('result').innerText = `今日結果：${data.result}`;
    }
</script>
</body>
</html>
